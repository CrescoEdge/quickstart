site_name: Cresco Documentation
site_description: The canonical documentation for Cresco — a hierarchical, secure, multi-tenant distributed agent mesh.
site_author: CrescoEdge
repo_url: https://github.com/CrescoEdge
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - content.code.copy
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
      - Installation & Build: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
  - Architecture:
      - Overview: architecture/overview.md
      - Messaging & Routing: architecture/messaging.md
      - Dynamic Cost-Aware Routing: architecture/dynamic-routing.md
      - Coordinator Decentralization: architecture/coordinator-decentralization.md
      - Tunnel Path Tracing: architecture/tunnel-tracing.md
      - Data Plane: architecture/dataplane.md
      - Discovery: architecture/discovery.md
      - Security & Identity: architecture/security.md
      - Multi-Tenancy: architecture/tenancy.md
      - Health & State: architecture/health.md
      - Metrics & Measurements: architecture/metrics.md
  - Modules & Plugins:
      - Overview: plugins/overview.md
      - agent (host bootstrap): plugins/agent.md
      - library (plugin API): plugins/library.md
      - controller (fabric brain): plugins/controller.md
      - core: plugins/core.md
      - logger: plugins/logger.md
      - repo: plugins/repo.md
      - filerepo: plugins/filerepo.md
      - sysinfo: plugins/sysinfo.md
      - wsapi: plugins/wsapi.md
      - stunnel: plugins/stunnel.md
      - executor: plugins/executor.md
  - API Reference:
      - Plugin Actions (Capability Inventory): api/plugin-actions.md
      - Library API: api/library-api.md
      - MsgEvent: api/msgevent.md
      - Configuration Parameters: reference/configuration.md
  - Client Libraries:
      - Overview: clients/overview.md
      - Java (clientlib): clients/java.md
      - Python (pycrescolib): clients/python.md
      - C++ / Arduino (cppcrescolib): clients/cpp.md
  - Operations:
